<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social | P&L Calendar</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <main class="container social-page">
    <section class="card social-card">
      <header class="social-header">
        <p class="tool-overline">Social</p>
        <h1>Your friend code</h1>
      </header>
      <div id="social-friend-code" class="social-friend-code">Loading...</div>
      <p class="helper">Share this code with other traders so they can add you.</p>
      <div id="social-error" class="error"></div>
    </section>
  </main>

  <script src="static/theme-utils.js"></script>
  <script src="static/app-header.js"></script>
  <script src="static/guest.js"></script>
  <script src="static/social.js"></script>
</body>
</html>
