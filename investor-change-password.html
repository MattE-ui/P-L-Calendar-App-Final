<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Portal — Set New Password</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="icon" type="image/png" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/investor-portal.css">
</head>
<body class="investor-auth-body">
  <main class="investor-auth-shell">
    <div class="investor-auth-brand">
      <span class="investor-auth-logomark" aria-hidden="true">V</span>
      <span class="investor-auth-brand-label">VERACITY · INVESTOR PORTAL</span>
    </div>
    <section class="investor-auth-card">
      <h1 class="investor-auth-title">Set your password</h1>
      <p class="investor-auth-subtitle">Your account manager has set a temporary password. Choose a permanent one to continue.</p>

      <label for="cp-current">Current (temporary) password</label>
      <input id="cp-current" type="password" autocomplete="current-password" placeholder="Enter the password you were given">

      <label for="cp-new">New password</label>
      <input id="cp-new" type="password" autocomplete="new-password" placeholder="12+ chars, upper, lower, number, symbol">

      <label for="cp-confirm">Confirm new password</label>
      <input id="cp-confirm" type="password" autocomplete="new-password" placeholder="Repeat new password">

      <button id="cp-submit-btn" class="primary investor-auth-submit" type="button">Set password &amp; continue</button>
      <div id="cp-error" class="error" style="min-height:1.2em"></div>
    </section>
  </main>
  <script src="/static/investor-portal.js"></script>
</body>
</html>
