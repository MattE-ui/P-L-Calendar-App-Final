<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groups | Veracity</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="icon" type="image/png" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container social-page">

    <!-- Page header: title left, subnav right -->
    <div class="sg-page-header">
      <div class="sg-page-title-block">
        <h1 class="sg-page-title">Groups</h1>
        <p class="sg-page-subtitle">Shared workspaces with traders you trust</p>
      </div>
      <nav class="social-tabs sg-subnav" aria-label="Social sections">
        <a class="social-tab" href="/social">Overview</a>
        <a class="social-tab is-active" href="/social/groups">Groups</a>
        <a class="social-tab" href="/social/network">Friends</a>
        <a class="social-tab" href="/social/profile">Profile</a>
        <a class="social-tab" href="/social/chat">Chat</a>
      </nav>
    </div>

    <p id="social-trade-group-notification-feedback" class="helper social-inline-feedback" aria-live="polite"></p>

    <!-- Two-column layout: 260px sidebar + fluid workspace -->
    <div class="sg-layout">

      <!-- Sidebar -->
      <aside id="sg-sidebar" class="sg-sidebar" aria-label="Groups navigation">

        <!-- Action buttons -->
        <div class="sg-sidebar-actions">
          <button id="sg-new-group-btn" class="sg-action-btn sg-action-btn--primary" type="button">
            <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">
              <path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            New group
          </button>
          <button id="sg-join-code-btn" class="sg-action-btn sg-action-btn--outline" type="button">
            Join by code
          </button>
        </div>

        <!-- Search -->
        <div class="sg-search-wrap">
          <svg class="sg-search-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
            <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8.5 8.5L11.5 11.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <input id="sg-search" class="sg-search" type="text" placeholder="Search groups" autocomplete="off">
        </div>

        <!-- Pending invitations (rendered by JS, hidden when empty) -->
        <div id="sg-pending-panel" class="sg-pending-panel hidden" role="region" aria-label="Pending invitations"></div>

        <!-- Your groups list -->
        <div class="sg-groups-section">
          <div class="sg-groups-section-header">
            <span id="sg-groups-label" class="sg-groups-label">YOUR GROUPS</span>
            <button id="sg-groups-collapse" class="sg-collapse-btn" type="button" aria-expanded="true" title="Collapse groups list">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                <path d="M1 3l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div id="sg-groups-list" class="sg-groups-list"></div>
        </div>

      </aside>

      <!-- Workspace -->
      <div id="sg-workspace" class="sg-workspace">

        <!-- Empty state (shown when no group selected) -->
        <div id="sg-workspace-empty" class="sg-workspace-empty">
          <div class="sg-workspace-empty-inner">
            <p class="sg-workspace-empty-title">No group selected</p>
            <p class="sg-workspace-empty-body">Select a group from the sidebar, or create one to get started.</p>
          </div>
        </div>

        <!-- Group header card -->
        <div id="sg-group-header" class="sg-card sg-group-header-card hidden"></div>

        <!-- Members + Positions row -->
        <div id="sg-cards-row" class="sg-cards-row hidden">
          <div id="sg-members-card" class="sg-card sg-members-card"></div>
          <div id="sg-positions-card" class="sg-card sg-positions-card"></div>
        </div>

        <!-- Shared watchlists -->
        <div id="sg-watchlists-card" class="sg-card sg-watchlists-card hidden"></div>

        <!-- Activity feed -->
        <div id="sg-activity-card" class="sg-card sg-activity-card hidden"></div>

      </div>
    </div>

    <!-- Modal backdrop (single shared layer) -->
    <div id="sg-modal-backdrop" class="sg-modal-backdrop hidden" aria-hidden="true">
      <div id="sg-modal-container" class="sg-modal-container" role="dialog" aria-modal="true" tabindex="-1"></div>
    </div>

  </main>

  <script src="/static/theme-utils.js"></script>
  <script src="/static/social-avatar.js"></script>
  <script src="/static/app-header.js"></script>
  <script src="/static/guest.js"></script>
  <script src="/static/social.js?v=20260319"></script>
</body>
</html>
