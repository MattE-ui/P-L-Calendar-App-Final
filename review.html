<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review | Veracity Trading Suite</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="icon" type="image/png" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="review-page-shell">
  <main class="container review-page" aria-label="Review workspace">
    <header class="review-page__head panelRaised">
      <div>
        <p class="tool-overline">Performance workflow</p>
        <h1>Review</h1>
        <p class="tool-sub">Analyse performance and plan next moves</p>
      </div>
    </header>

    <nav id="review-tabs" class="review-tabs" aria-label="Review sections">
      <button class="review-tabs__btn is-active" data-tab="recap" type="button">Recap</button>
      <button class="review-tabs__btn" data-tab="trade-review" type="button">Trade Review</button>
      <button class="review-tabs__btn" data-tab="scorecard" type="button">Scorecard</button>
      <button class="review-tabs__btn" data-tab="planning" type="button">Planning</button>
    </nav>

    <section id="review-tab-content" class="review-tab-content panelRaised" aria-live="polite"></section>
  </main>

  <div id="weekly-recap-modal" class="modal hidden">
    <div class="modal-card weekly-recap-modal-card">
      <div class="weekly-recap-modal-head">
        <div>
          <p class="tool-overline">Weekly recap</p>
          <h3 id="weekly-recap-title">Last completed week</h3>
        </div>
        <button id="weekly-recap-close-btn" class="ghost close-btn" type="button" aria-label="Close weekly recap">✕</button>
      </div>
      <div id="weekly-recap-content" class="weekly-recap-content"></div>
    </div>
  </div>

  <script src="/static/theme-utils.js"></script>
  <script src="/static/social-avatar.js"></script>
  <script src="/static/app-header.js"></script>
  <script src="/static/guest.js"></script>
  <script src="/static/review.js"></script>
</body>
</html>
