<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Veracity Trading Suite - Settings</title><link rel="stylesheet" href="/static/style.css"></head><body>
<main class="container profile-hub-container">
<section class="card profile-subsection-card"><p class="profile-hub-summary__eyebrow">Account center</p><h1>Settings</h1><p class="helper">Configure non-security account preferences and app behavior defaults.</p><div class="profile-actions"><a class="ghost" href="/profile.html">Back to Account Center</a></div></section>
<section class="card profile-card"><h2>General preferences</h2><div class="profile-field"><label for="settings-risk">Default risk % per trade</label><select id="settings-risk"><option value="0.1">0.1%</option><option value="0.25">0.25%</option><option value="0.5">0.5%</option><option value="1">1%</option><option value="2">2%</option></select></div><div class="profile-field"><label for="settings-currency">Default currency</label><select id="settings-currency"><option value="GBP">GBP (£)</option><option value="USD">USD ($)</option></select></div></section>
<section class="card profile-card"><h2>Display/defaults</h2><p class="helper">Defaults apply to trade entry and analytics displays across the app shell.</p></section>
<section class="card profile-card"><h2>Data/export</h2><div class="profile-actions"><a class="ghost" href="/transactions.html">Open transactions for export workflows</a></div></section>
<div class="profile-actions"><button id="settings-save" class="primary" type="button">Save preferences</button></div><div id="settings-status" class="status-line"></div>
</main>
<script src="/static/theme-utils.js"></script><script src="/static/app-header.js"></script><script src="/static/guest.js"></script><script src="/static/account-center-common.js"></script><script src="/static/profile-settings-page.js"></script>
</body></html>
