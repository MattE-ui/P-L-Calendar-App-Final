<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions | P&L Calendar</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  

  <main class="container">
    <p class="tool-note">Deposits and withdrawals logged across your calendar.</p>

    <section class="tool-card">
      <div class="section-header">
        <div>
          <p class="tool-overline">Filters</p>
          <h3>Find transactions</h3>
        </div>
        <div class="filter-actions">
          <button id="apply-filters-btn" class="primary">Apply filters</button>
          <button id="reset-filters-btn" class="ghost">Reset</button>
        </div>
      </div>
      <div class="filter-bar">
        <div class="tool-field">
          <label for="filter-from">From</label>
          <input id="filter-from" type="date">
        </div>
        <div class="tool-field">
          <label for="filter-to">To</label>
          <input id="filter-to" type="date">
        </div>
        <div class="tool-field">
          <label for="filter-type">Type</label>
          <select id="filter-type">
            <option value="" selected>All</option>
            <option value="Deposit">Deposits</option>
            <option value="Withdrawal">Withdrawals</option>
          </select>
        </div>
        <div class="tool-field">
          <label for="filter-search">Notes</label>
          <input id="filter-search" type="text" placeholder="Search notes">
        </div>
      </div>
    </section>

    <section class="list-card">
      <table class="transaction-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Notes</th>
            <th></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="transactions-body"></tbody>
      </table>
      <p id="transactions-empty" class="tool-note">No transactions logged yet.</p>
    </section>
  </main>

  <div id="transactions-settings-modal" class="modal hidden">
    <div class="modal-card">
      <h3>Quick settings</h3>
      <div class="modal-field">
        <p class="tool-note">Split Profits has been replaced by Investor Accounts.</p>
        <p class="tool-note"><a href="/profile.html">Open Profile & Settings → Investors</a></p>
      </div>
      <div class="row">
        <button id="transactions-save-qs-btn" class="primary">Save</button>
        <button id="transactions-close-qs-btn" class="ghost">Close</button>
      </div>
    </div>
  </div>

  <div id="transactions-note-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Edit notes</h3>
        <button id="transactions-note-close-btn" class="ghost close-btn" aria-label="Close notes">✕</button>
      </div>
      <div class="modal-field">
        <label for="transactions-note-input">Notes</label>
        <textarea id="transactions-note-input" rows="4" placeholder="Add a note for this transaction"></textarea>
      </div>
      <div id="transactions-note-status" class="helper" aria-live="polite"></div>
      <div class="row">
        <button id="transactions-note-save-btn" class="primary">Save</button>
        <button id="transactions-note-cancel-btn" class="ghost">Cancel</button>
      </div>
    </div>
  </div>

  

  <script src="static/theme-utils.js"></script>
  <script src="static/social-avatar.js"></script>
  <script src="static/app-header.js"></script>
  <script src="static/transactions.js"></script>
</body>
</html>
