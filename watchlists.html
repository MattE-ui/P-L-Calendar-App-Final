<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlists | Veracity Trading Suite</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container watchlists-page">

    <div class="wl-layout">

      <!-- ── Sidebar ────────────────────────────────────────────── -->
      <aside class="wl-sidebar">

        <div class="wl-sidebar__page-label">
          <p class="wl-sidebar__overline">Trading workflow</p>
          <h1 class="wl-sidebar__title">Watchlists</h1>
        </div>

        <button id="wl-new-btn" class="wl-sidebar__new-btn" type="button">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"
               stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
            <line x1="6.5" y1="1" x2="6.5" y2="12"/>
            <line x1="1" y1="6.5" x2="12" y2="6.5"/>
          </svg>
          New watchlist
        </button>

        <div class="wl-sidebar__search-wrap">
          <svg class="wl-sidebar__search-icon" width="13" height="13" viewBox="0 0 13 13"
               fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="5.5" cy="5.5" r="4"/>
            <line x1="8.8" y1="8.8" x2="12" y2="12"/>
          </svg>
          <input id="wl-search" class="wl-sidebar__search" type="search"
                 placeholder="Search watchlists" autocomplete="off" aria-label="Search watchlists">
        </div>

        <div id="wl-sidebar-lists" class="wl-sidebar__lists" role="list"></div>

        <p id="wl-page-feedback" class="helper social-inline-feedback" aria-live="polite"></p>

      </aside>

      <!-- ── Content ────────────────────────────────────────────── -->
      <div class="wl-content">
        <div id="wl-header-card" class="wl-header-card card"></div>
        <div id="wl-sections" class="wl-sections"></div>
      </div>

    </div>
  </main>

  <!-- Modal — unchanged from original -->
  <dialog id="watchlist-modal" class="social-modal watchlist-builder-modal">
    <form method="dialog" class="social-modal-card" id="watchlist-modal-form">
      <header class="social-modal-header">
        <h3 id="watchlist-modal-title">Create watchlist</h3>
        <button type="button" id="watchlist-modal-close" class="ghost">Close</button>
      </header>
      <label>Title<input id="watchlist-modal-name" type="text" maxlength="120"
        placeholder="Key Stocks to Watch Next Week"></label>
      <label>Notes<textarea id="watchlist-modal-notes" rows="3" maxlength="1200"
        placeholder="Optional research notes"></textarea></label>
      <section class="watchlist-builder-shell" aria-label="Watchlist builder">
        <header class="watchlist-builder-shell__header">
          <h4>Add tickers, then organize visually</h4>
          <button type="button" id="watchlist-modal-add-group" class="ghost">Add Group</button>
        </header>
        <label>Add ticker
          <input id="watchlist-modal-ticker-input" type="text"
            placeholder="Type ticker and press Enter" autocomplete="off" spellcheck="false">
        </label>
        <div id="watchlist-builder-board" class="watchlist-builder-board"></div>
      </section>
      <p id="watchlist-modal-feedback" class="helper social-inline-feedback" aria-live="polite"></p>
      <footer class="social-row-actions">
        <button type="button" id="watchlist-modal-save" class="primary">Save Watchlist</button>
      </footer>
    </form>
  </dialog>

  <script src="/static/theme-utils.js"></script>
  <script src="/static/perf-diagnostics.js"></script>
  <script src="/static/app-header.js"></script>
  <script src="/static/guest.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js" crossorigin="anonymous"></script>
  <script src="/static/watchlists-compute.js"></script>
  <script src="/static/watchlists-render.js"></script>
  <script src="/static/watchlists.js"></script>
</body>
</html>
