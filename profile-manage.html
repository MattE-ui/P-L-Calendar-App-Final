<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veracity Trading Suite - Manage Profile</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="icon" type="image/png" href="/static/Veracity-notification-logo.png?v=20260318">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container profile-hub-container">
    <section class="card profile-subsection-card" aria-labelledby="section-title">
      <p class="profile-hub-summary__eyebrow">Account center</p>
      <h1 id="section-title">Manage Profile</h1>
      <p class="helper">Update identity details, social avatar, and baseline portfolio profile fields.</p>
      <div class="profile-actions"><a class="ghost" href="/profile.html">Back to Account Center</a></div>
    </section>

    <section class="card profile-card">
      <h2>Identity</h2>
      <div class="profile-field"><label for="manage-username">Username</label><input id="manage-username" type="text" readonly></div>
      <div class="profile-field"><label for="manage-email">Account email</label><input id="manage-email" type="text" readonly></div>
      <div class="profile-field"><label for="manage-nickname">Nickname</label><input id="manage-nickname" type="text" maxlength="20"></div>
      <div class="profile-actions"><button id="manage-save-nickname" class="primary" type="button">Save nickname</button></div>
      <div id="manage-identity-status" class="status-line"></div>
    </section>

    <section class="card profile-card">
      <h2>Avatar</h2>
      <div class="profile-avatar-controls">
        <div id="manage-avatar-preview" class="social-avatar-slot">VT</div>
        <div class="profile-avatar-actions">
          <input id="manage-avatar-input" type="file" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" class="hidden">
          <button id="manage-avatar-upload" class="ghost" type="button">Upload avatar</button>
          <button id="manage-avatar-remove" class="danger outline" type="button">Remove avatar</button>
        </div>
      </div>
      <div id="manage-avatar-status" class="status-line"></div>
    </section>

    <section class="card profile-card">
      <h2>Portfolio baseline</h2>
      <div class="profile-field"><label for="manage-portfolio">Current portfolio value (£)</label><input id="manage-portfolio" type="number" step="0.01" min="0"></div>
      <div class="profile-field"><label for="manage-net">Net deposits to date (£)</label><input id="manage-net" type="number" step="0.01"></div>
      <div class="profile-actions"><button id="manage-save-baseline" class="primary" type="button">Save baseline</button></div>
      <div id="manage-baseline-status" class="status-line"></div>
    </section>
  </main>

  <script src="/static/theme-utils.js"></script>
  <script src="/static/app-header.js"></script>
  <script src="/static/guest.js"></script>
  <script src="/static/account-center-common.js"></script>
  <script src="/static/profile-manage-page.js"></script>
</body>
</html>
